<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  .card {
    width: 1200px;
    height: 630px;
    background: #f5f0eb;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* Subtle grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(26,24,22,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(26,24,22,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Dark right panel — just a clean block */
  .dark-panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 42%;
    background: #2d2a26;
  }

  .dark-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(143,165,150,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(143,165,150,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Warm glow */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(208,94,65,0.12) 0%, transparent 70%);
    top: 50%;
    right: 15%;
    transform: translateY(-50%);
    border-radius: 50%;
  }

  /* Stats inside dark panel */
  .stats {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 42%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 28px;
    z-index: 2;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: #d05e41;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,240,235,0.4);
  }

  .stat-divider {
    width: 40px;
    height: 1px;
    background: rgba(143,165,150,0.2);
  }

  /* Content — left side */
  .content {
    position: relative;
    z-index: 5;
    padding: 60px 64px;
    max-width: 680px;
  }

  .mono-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #d05e41;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .mono-label::before {
    content: '';
    display: block;
    width: 28px;
    height: 2px;
    background: #d05e41;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 92px;
    line-height: 0.9;
    font-weight: 700;
    color: #2d2a26;
    letter-spacing: -4px;
    margin-bottom: 20px;
  }

  h1 span {
    color: #d05e41;
  }

  .sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    color: #6b665c;
    line-height: 1.5;
    margin-bottom: 28px;
    max-width: 460px;
  }

  .bottom-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    color: #8a8580;
  }

  .bottom-dot {
    width: 4px;
    height: 4px;
    background: #d05e41;
    border-radius: 50%;
  }

  /* Accent lines */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #d05e41, #e07a5f 50%, #8fa596 100%);
    z-index: 10;
  }

  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #8fa596, #d05e41 100%);
    z-index: 10;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid-bg"></div>
  <div class="top-line"></div>
  <div class="bottom-line"></div>

  <div class="dark-panel"></div>
  <div class="glow"></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">40+</div>
      <div class="stat-label">Prompts</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">6</div>
      <div class="stat-label">Projects</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num">11+</div>
      <div class="stat-label">Domains</div>
    </div>
  </div>

  <div class="content">
    <div class="mono-label">Clinical Technology Studio</div>
    <h1>The Tech<br><span>SLP</span></h1>
    <p class="sub">Where clinical expertise meets modern technology.</p>
    <div class="bottom-row">
      <span>thetechslp.com</span>
      <div class="bottom-dot"></div>
      <span>Kristine Deverett, CCC-SLP</span>
    </div>
  </div>
</div>
</body>
</html>
