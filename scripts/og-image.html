<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }

  .card {
    width: 1200px;
    height: 630px;
    background: #f5f0eb;
    position: relative;
    display: flex;
    overflow: hidden;
  }

  /* Grid background — matches the site hero */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(26,24,22,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(26,24,22,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Sage green structural block (top-right) */
  .block-sage {
    position: absolute;
    top: -20px;
    right: -20px;
    width: 380px;
    height: 420px;
    background: #8fa596;
    border: 2px solid #2d2a26;
    border-radius: 6px;
    transform: rotate(2deg);
    box-shadow: 6px 6px 0 #2d2a26;
  }

  /* Dark structural block (overlapping) */
  .block-dark {
    position: absolute;
    top: 100px;
    right: 40px;
    width: 320px;
    height: 360px;
    background: #2d2a26;
    border: 2px solid #2d2a26;
    border-radius: 6px;
    transform: rotate(-1deg);
    box-shadow: 6px 6px 0 rgba(208,94,65,0.3);
    overflow: hidden;
  }

  /* Faux code lines inside dark block */
  .code-lines {
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .code-line {
    height: 3px;
    border-radius: 2px;
  }

  .cl-primary { background: rgba(208,94,65,0.5); }
  .cl-sage { background: rgba(143,165,150,0.4); }
  .cl-muted { background: rgba(245,240,235,0.1); }

  /* Small geometric accents */
  .accent-square {
    position: absolute;
    border: 2px solid;
    border-radius: 3px;
  }

  .sq-1 {
    width: 50px;
    height: 50px;
    top: 420px;
    right: 380px;
    border-color: rgba(208,94,65,0.2);
    transform: rotate(15deg);
  }

  .sq-2 {
    width: 35px;
    height: 35px;
    top: 80px;
    right: 420px;
    border-color: rgba(143,165,150,0.25);
    transform: rotate(-10deg);
  }

  /* Left content area */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 70px 80px;
    max-width: 720px;
  }

  .mono-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #d05e41;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mono-label::before {
    content: '';
    display: block;
    width: 28px;
    height: 2px;
    background: #d05e41;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 86px;
    font-weight: 700;
    color: #1a1816;
    line-height: 0.95;
    letter-spacing: -3px;
    margin-bottom: 6px;
  }

  .title span {
    color: #d05e41;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 400;
    color: #8a8580;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* Tech badge bar */
  .badge-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 3px;
    border: 2px solid;
  }

  .badge-primary {
    color: #d05e41;
    border-color: #d05e41;
    background: rgba(208,94,65,0.06);
  }

  .badge-secondary {
    color: #5a7c64;
    border-color: #8fa596;
    background: rgba(143,165,150,0.08);
  }

  .badge-dark {
    color: #2d2a26;
    border-color: #2d2a26;
    background: rgba(45,42,38,0.04);
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: #2d2a26;
    display: flex;
    align-items: center;
    padding: 0 80px;
    gap: 16px;
    z-index: 10;
  }

  .bottom-bar span {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #f5f0eb;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .bottom-bar .sep {
    width: 4px;
    height: 4px;
    background: #d05e41;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Terracotta accent line at very bottom */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #d05e41, #e07a5f 50%, #8fa596 100%);
    z-index: 20;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>

    <!-- Structural blocks (like the hero image area) -->
    <div class="block-sage"></div>
    <div class="block-dark">
      <div class="code-lines">
        <div class="code-line cl-primary" style="width: 140px;"></div>
        <div class="code-line cl-muted" style="width: 200px;"></div>
        <div class="code-line cl-sage" style="width: 100px;"></div>
        <div class="code-line cl-muted" style="width: 170px;"></div>
        <div class="code-line cl-primary" style="width: 80px;"></div>
        <div class="code-line cl-muted" style="width: 220px;"></div>
        <div class="code-line cl-sage" style="width: 130px;"></div>
        <div class="code-line cl-muted" style="width: 160px;"></div>
        <div class="code-line cl-primary" style="width: 110px;"></div>
        <div class="code-line cl-muted" style="width: 190px;"></div>
        <div class="code-line cl-sage" style="width: 70px;"></div>
        <div class="code-line cl-muted" style="width: 150px;"></div>
        <div class="code-line cl-primary" style="width: 180px;"></div>
        <div class="code-line cl-muted" style="width: 120px;"></div>
        <div class="code-line cl-sage" style="width: 200px;"></div>
        <div class="code-line cl-muted" style="width: 90px;"></div>
      </div>
    </div>

    <!-- Small accent squares -->
    <div class="accent-square sq-1"></div>
    <div class="accent-square sq-2"></div>

    <div class="content">
      <div class="mono-label">Clinical Technology Studio</div>
      <div class="title">The Tech<br><span>SLP</span></div>
      <div class="subtitle">Build &middot; Ship &middot; Heal</div>
      <div class="badge-row">
        <div class="badge badge-primary">React + TypeScript</div>
        <div class="badge badge-secondary">Clinical UX</div>
        <div class="badge badge-dark">AI Integration</div>
        <div class="badge badge-primary">HIPAA-Ready</div>
      </div>
    </div>

    <div class="bottom-bar">
      <span>thetechslp.com</span>
      <div class="sep"></div>
      <span>Kristine Deverett, CCC-SLP</span>
      <div class="sep"></div>
      <span>Seattle, WA</span>
    </div>

    <div class="accent-line"></div>
  </div>
</body>
</html>
