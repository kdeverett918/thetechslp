services:
  - type: web
    name: the-tech-slp
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /prompts
        destination: /prompts/index.html
      - type: rewrite
        source: /prompts/
        destination: /prompts/index.html
      - type: rewrite
        source: /*
        destination: /index.html
